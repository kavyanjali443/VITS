<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* Calculator Box */
.container{
    background: rgba(255,255,255,0.05);
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Title */
h1{
    color:#38bdf8;
    margin-bottom:15px;
}

/* Inputs */
input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:16px;
}

/* Buttons */
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    background:#38bdf8;
    color:#0f172a;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
    transform:scale(1.1);
}

/* Result */
h3{
    margin-top:15px;
    font-size:18px;
    color:#f1f5f9;
}
</style>

</head>

<body>

<div class="container">

    <h1>Calculator</h1>

    Number 1:
    <input type="number" id="num1" placeholder="Enter number">

    Number 2:
    <input type="number" id="num2" placeholder="Enter number">

    <div>
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>
    </div>

    <h3 id="result">Result: </h3>

</div>

<script>
function calculate(operator){
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let result;

    switch(operator){
        case '+':
            result = a + b;
            break;
        case '-':
            result = a - b;
            break;
        case '*':
            result = a * b;
            break;
        case '/':
            result = a / b;
            break;
        default:
            result = "Invalid";
    }

    document.getElementById("result").innerText = "Result: " + result;
}
</script>

</body>
</html>
